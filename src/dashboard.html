<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel AgentOS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--green:#3fb950;--red:#f85149;--yellow:#d2991d;--blue:#58a6ff;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:20px;display:flex;align-items:center;gap:8px}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.5}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.card h3{font-size:13px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card .value{font-size:28px;font-weight:700}
.card .label{font-size:12px;color:#8b949e;margin-top:4px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 24px 24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.chart-card h3{font-size:13px;color:#8b949e;margin-bottom:12px}
.chart-card canvas{max-height:260px}
.timeline{padding:0 24px 24px}
.timeline h3{font-size:14px;color:#8b949e;margin-bottom:12px}
.tl-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.tl-item .badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-pass{background:#1a3a2a;color:var(--green)}
.badge-fail{background:#3a1a1a;color:var(--red)}
.badge-warn{background:#3a2a1a;color:var(--yellow)}
.refresh{font-size:12px;color:#8b949e;cursor:pointer;user-select:none}
.refresh:hover{color:var(--blue)}
.warn{color:var(--yellow)}
.good{color:var(--green)}
.bad{color:var(--red)}
</style>
</head>
<body>
<header>
<h1>🛡️ Sentinel AgentOS <span style="font-size:13px;color:#8b949e;font-weight:400">Dashboard</span></h1>
<div><span class="status-dot" id="dot"></span> <span id="uptime" style="font-size:12px;color:#8b949e"></span></div>
</header>

<div class="grid">
<div class="card">
<h3>总操作数</h3><div class="value" id="totalOps">-</div><div class="label">全部工具调用</div>
</div>
<div class="card">
<h3>验证通过率</h3><div class="value good" id="passRate">-</div><div class="label">Verify Gate</div>
</div>
<div class="card">
<h3>高风险操作</h3><div class="value warn" id="highRisk">-</div><div class="label">Risk > 70</div>
</div>
<div class="card">
<h3>满意度</h3><div class="value" id="satisfaction">-</div><div class="label">Implicit Feedback</div>
</div>
<div class="card">
<h3>质量分</h3><div class="value" id="quality">-</div><div class="label">Agent Profile</div>
</div>
<div class="card">
<h3>工作记忆</h3><div class="value" id="wmMsgs">-</div><div class="label">Working Memory</div>
</div>
</div>

<div class="charts">
<div class="chart-card"><h3>📊 审计通过/失败</h3><canvas id="auditChart"></canvas></div>
<div class="chart-card"><h3>📈 质量趋势</h3><canvas id="qualityChart"></canvas></div>
</div>

<div class="timeline">
<h3>📋 最近审计</h3><div id="timeline">加载中...</div>
</div>

<script>
let auditChart, qualityChart;
const trendPoints = [];

async function refresh() {
  try {
    const r = await fetch('/pipeline/report');
    const d = await r.json();
    render(d);
  } catch (e) {
    document.getElementById('timeline').innerHTML = '❌ 无法连接服务器';
  }
}

function render(d) {
  // Stats
  const total = d.audit?.totalOperations || 0;
  const failed = d.audit?.verifyFailures || 0;
  const passed = total - failed;
  const rate = total ? Math.round(passed/total*100) : 100;

  document.getElementById('totalOps').textContent = total;
  document.getElementById('passRate').textContent = rate + '%';
  document.getElementById('highRisk').textContent = d.audit?.highRiskOps || 0;
  document.getElementById('satisfaction').textContent = (d.satisfaction || 0) + '/100';
  document.getElementById('quality').textContent = (d.quality?.overallScore || d.quality || 0);
  document.getElementById('wmMsgs').textContent = d.workingMemory?.messages || 0;

  // Uptime
  document.getElementById('uptime').textContent = d.uptime || '';

  // Charts
  trendPoints.push({ t: new Date().toLocaleTimeString(), q: d.quality?.overallScore || 0 });
  if (trendPoints.length > 20) trendPoints.shift();

  if (!auditChart) {
    auditChart = new Chart(document.getElementById('auditChart'), {
      type: 'doughnut',
      data: { labels: ['通过','失败'], datasets: [{ data: [passed, failed], backgroundColor: ['#3fb950','#f85149'] }] },
      options: { plugins: { legend: { position: 'bottom', labels: { color: '#8b949e', font: { size: 11 } } } } }
    });
  } else {
    auditChart.data.datasets[0].data = [passed, failed];
    auditChart.update();
  }

  if (!qualityChart) {
    qualityChart = new Chart(document.getElementById('qualityChart'), {
      type: 'line',
      data: { labels: trendPoints.map(x => x.t), datasets: [{ label: '质量分', data: trendPoints.map(x => x.q), borderColor: '#58a6ff', tension: .3, fill: false, pointRadius: 2 }] },
      options: { scales: { x: { ticks: { color: '#8b949e', font: { size: 10 } } }, y: { min: 0, max: 100, ticks: { color: '#8b949e' } } }, plugins: { legend: { labels: { color: '#8b949e' } } } }
    });
  } else {
    qualityChart.data.labels = trendPoints.map(x => x.t);
    qualityChart.data.datasets[0].data = trendPoints.map(x => x.q);
    qualityChart.update();
  }

  // Timeline
  const tl = document.getElementById('timeline');
  const items = d.timeline || d.audit?.recent || [];
  tl.innerHTML = items.length ? items.slice(0, 12).map(e => {
    const badge = e.verify === 'PASS' ? 'badge-pass' : e.verify === 'FAIL' ? 'badge-fail' : 'badge-warn';
    return `<div class="tl-item"><span>${e.tool || '-'} <span style="color:#8b949e;font-size:11px">${e.ts?.slice(11,19) || ''}</span></span><span class="badge ${badge}">${e.verify || '-'}</span></div>`;
  }).join('') : '<div class="tl-item">暂无审计记录</div>';
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
