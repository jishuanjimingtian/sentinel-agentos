<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel AgentOS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #020617; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
.container { text-align: center; }
svg { width: 420px; height: 420px; display: block; margin: 0 auto; }
.name { color: #E2E8F0; font-size: 28px; font-weight: 700; letter-spacing: 4px; margin-top: 20px; }
.sub { color: #64748B; font-size: 13px; letter-spacing: 8px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="420" height="420">
    <defs>
      <radialGradient id="bg" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0F172A"/>
        <stop offset="100%" stop-color="#020617"/>
      </radialGradient>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#06B6D4"/>
        <stop offset="50%" stop-color="#3B82F6"/>
        <stop offset="100%" stop-color="#8B5CF6"/>
      </linearGradient>
    </defs>
    <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
    <circle cx="256" cy="248" r="100" fill="none" stroke="#1E293B" stroke-width="1"/>
    <circle cx="256" cy="248" r="88" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    <path d="M170 310 Q256 346 342 310" fill="none" stroke="#334155" stroke-width="1"/>
    <g transform="translate(256,250)">
      <line x1="-16" y1="-42" x2="16" y2="-42" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="16" y1="-42" x2="16" y2="-14" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="16" y1="-14" x2="-16" y2="-14" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="-16" y1="-14" x2="-16" y2="14" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="-16" y1="14" x2="16" y2="14" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="16" y1="14" x2="16" y2="42" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="16" y1="42" x2="-16" y2="42" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
    </g>
  </svg>
  <div class="name">SENTINEL AGENTOS</div>
  <div class="sub">GUARD · MEMORY · EVALUATION</div>
</div>
</body>
</html>
