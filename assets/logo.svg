<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- 圆角方底 -->
  <rect x="20" y="20" width="472" height="472" rx="96" fill="url(#bg)" stroke="#1E293B" stroke-width="4"/>

  <!-- 极简盾牌轮廓衬托 -->
  <path d="M256 60 L410 138 L410 260 Q410 358 256 440 Q102 358 102 260 L102 138 Z"
        fill="url(#shieldGrad)" stroke="#1E293B" stroke-width="2"/>

  <!-- SENTINEL — 上方大号 -->
  <text x="256" y="210" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="72" font-weight="700" letter-spacing="6"
        fill="#F1F5F9">SENTINEL</text>

  <!-- AGENTOS — 下方等宽 -->
  <text x="256" y="290" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="52" font-weight="300" letter-spacing="12"
        fill="url(#sGrad)">AGENTOS</text>

  <!-- 底部三点 — Guard · Memory · Evaluator -->
  <circle cx="180" cy="370" r="6" fill="#22D3EE"/>
  <circle cx="256" cy="370" r="6" fill="#3B82F6"/>
  <circle cx="332" cy="370" r="6" fill="#8B5CF6"/>

  <!-- Guard · Memory · Evaluator 文字 -->
  <text x="180" y="396" text-anchor="middle"
        font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="400" letter-spacing="3"
        fill="#64748B">GUARD</text>
  <text x="256" y="396" text-anchor="middle"
        font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="400" letter-spacing="3"
        fill="#64748B">MEMORY</text>
  <text x="332" y="396" text-anchor="middle"
        font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="400" letter-spacing="3"
        fill="#64748B">EVAL</text>
</svg>
